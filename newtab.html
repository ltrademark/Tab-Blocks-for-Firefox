<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="./icons/favicon.png" sizes="24x24">
  <title>New ✦</title>
  <link rel="stylesheet" href="./newtab.css">
</head>
<body>
  <div class="app-container">
    <div class="main-content">
      <div class="main-content--actions">
        <div class="collection-search">
          <input type="search" id="search-input" placeholder="Search Collections..." aria-label="Search Collections">
          <div class="f-icon search-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </div>
          <div class="search-toggle" id="search-toggle-container">
            <input type="radio" id="search-target-collections" name="search-target" value="collections" checked>
            <label for="search-target-collections">Collections</label>
            <input type="radio" id="search-target-tabs" name="search-target" value="tabs">
            <label for="search-target-tabs">Open Tabs</label>
            <div class="search-toggle-slider"></div>
          </div>
        </div>
        <div class="controls">
          <button id="export-btn" class="btn btn-sm btn-default" title="Export Collections to JSON file">
            <div class="f-icon">
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
              </svg>
            </div>
            <span class="btn-label">Export</span>
          </button>
          <button id="import-btn" class="btn btn-sm btn-default" title="Import Collections from JSON file">
            <div class="f-icon">
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
            </div>
            <span class="btn-label">Import</span>
          </button>
          <button id="add-collection-btn" class="add-collection-btn btn btn-sm btn-primary" title="Add Collection">
            <div class="f-icon">
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </div>
            <span class="btn-label">Add Collection</span>
          </button>
          <button id="collapse-all-btn" class="btn btn-sm btn-default" title="Collapse/Expand All Collections">
            <div class="f-icon">
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="17 11 12 6 7 11"></polyline>
                <polyline points="17 18 12 13 7 18"></polyline>
              </svg>
            </div>
          </button>
        </div>
      </div>
      <div id="collections-container">
        <div class="loading-indicator">Loading collections...</div>
      </div>
      <div class="main-content--footer">
        <p>Tab Blocks &copy; 2026 All rights reserved. Made with ❤️ by <a href="https://ltrademark.com/links" title="Author's Domain">Ltrademark&trade;</a></p>
      </div>
    </div>

    <div class="sidebar">
      <h2>
        Open Tabs
        <button id="refresh-tabs-btn" class="btn btn-default btn-sm btn-q" aria-label="Refresh tabs"
          title="Refresh tabs">
          <div class="f-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1 4 1 10 7 10"></polyline>
              <polyline points="23 20 23 14 17 14"></polyline>
              <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
            </svg>
          </div>
        </button>
      </h2>
      <div id="tabs-list">
        <div class="loading-indicator">Loading tabs...</div>
      </div>
    </div>
  </div>
  <!-- Import modal -->
  <div id="import-modal" hidden>
    <div class="modal-backdrop" id="import-modal-backdrop"></div>
    <div class="modal-panel import-modal-panel">
      <div class="import-modal-header">
        <h3 class="modal-title" id="import-modal-title">Import Collections</h3>
        <button class="btn btn-default btn-sm btn-sq" id="import-modal-close" title="Close">
          <div class="f-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </div>
        </button>
      </div>

      <!-- Step 1: Upload -->
      <div id="import-step-upload" class="import-step">
        <label class="import-dropzone" id="import-dropzone" for="import-file-input">
          <div class="f-icon import-dropzone-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
          </div>
          <span>Drop a <code>.json</code> file here</span>
          <span class="import-dropzone-sub">or click to browse</span>
          <input type="file" id="import-file-input" accept=".json">
        </label>
        <p class="import-error" id="import-error" hidden></p>
      </div>

      <!-- Step 2: Preview + mode -->
      <div id="import-step-preview" class="import-step" hidden>
        <div class="import-file-info" id="import-file-info"></div>
        <div class="import-mode-options">
          <label class="import-mode-option">
            <input type="radio" name="import-mode" value="merge" checked>
            <div class="import-mode-option-content">
              <strong>Merge</strong>
              <span class="import-mode-desc" id="import-merge-desc"></span>
            </div>
          </label>
          <label class="import-mode-option">
            <input type="radio" name="import-mode" value="override">
            <div class="import-mode-option-content">
              <strong>Override</strong>
              <span class="import-mode-desc" id="import-override-desc"></span>
            </div>
          </label>
        </div>
      </div>

      <!-- Step 3: Conflict resolution -->
      <div id="import-step-conflicts" class="import-step" hidden>
        <p class="import-conflicts-intro">These collections need your attention before importing:</p>
        <div id="import-conflicts-list" class="import-conflicts-list"></div>
      </div>

      <!-- Shared footer (always visible) -->
      <div class="import-modal-footer">
        <button class="btn btn-default" id="import-btn-back">Cancel</button>
        <button class="btn btn-primary" id="import-btn-primary" disabled>Continue</button>
      </div>
    </div>
  </div>

  <!-- Mobile: Bottom sheet for picking an open tab to add -->
  <div id="mobile-tab-sheet" hidden>
    <div class="sheet-backdrop" id="sheet-backdrop"></div>
    <div class="sheet-panel">
      <div class="sheet-header">
        <span class="sheet-title">Add Tab to Collection</span>
        <button class="btn btn-default btn-sm btn-sq" id="sheet-close" title="Close">
          <div class="f-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </div>
        </button>
      </div>
      <div id="sheet-tabs-list"></div>
    </div>
  </div>

  <!-- Mobile: Collection edit / delete modal -->
  <div id="mobile-collection-modal" class="mobile-modal" hidden>
    <div class="modal-backdrop" id="collection-modal-backdrop"></div>
    <div class="modal-panel">
      <h3 class="modal-title">Edit Collection</h3>
      <input type="text" id="modal-collection-title" class="modal-input" placeholder="Collection Name">
      <div class="modal-actions">
        <button id="modal-collection-save" class="btn btn-primary">Save</button>
        <button id="modal-collection-delete" class="btn btn-danger">Delete Collection</button>
      </div>
    </div>
  </div>

  <!-- Mobile: Link edit / delete modal -->
  <div id="mobile-link-modal" class="mobile-modal" hidden>
    <div class="modal-backdrop" id="link-modal-backdrop"></div>
    <div class="modal-panel">
      <h3 class="modal-title">Edit Link</h3>
      <input type="text" id="modal-link-title" class="modal-input" placeholder="Link Title">
      <div class="modal-actions">
        <button id="modal-link-save" class="btn btn-primary">Save Title</button>
        <button id="modal-link-delete" class="btn btn-danger">Delete Link</button>
      </div>
    </div>
  </div>

  <script src="./newtab.js" defer></script>
</body>

</html>
